spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: auth-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/auth_db}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
    open-in-view: false
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      password: ${SPRING_DATA_REDIS_PASSWORD:}
      timeout: ${SPRING_DATA_REDIS_TIMEOUT:2s}
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}

server:
  port: ${SERVER_PORT:8081}

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true
    ip-address: 192.168.1.3


auth:
  jwt:
    issuer: ${AUTH_JWT_ISSUER:auth-service}
    secret: ${AUTH_JWT_SECRET:NUQyuZhoBd6u6O6dAP30Rgu5bqv5TdzpKreGhZGExSaHXEQIM3kicw9uptSaJP9Q}
    access-token-expiration: ${AUTH_JWT_ACCESS_TOKEN_EXPIRATION:15m}
    refresh-token-expiration: ${AUTH_JWT_REFRESH_TOKEN_EXPIRATION:7d}
  google:
    client-id: ${AUTH_GOOGLE_CLIENT_ID}
  redis:
    refresh-token-key-prefix: ${AUTH_REDIS_REFRESH_TOKEN_KEY_PREFIX:refresh:}
  cookie:
    refresh-token-name: ${AUTH_COOKIE_REFRESH_TOKEN_NAME:refreshTokenId}
    secure: ${AUTH_COOKIE_SECURE:true}
    http-only: ${AUTH_COOKIE_HTTP_ONLY:true}
    same-site: ${AUTH_COOKIE_SAME_SITE:Strict}
    path: ${AUTH_COOKIE_PATH:/api/v1/auth}
    domain: ${AUTH_COOKIE_DOMAIN:}
  rate-limit:
    login-register:
      enabled: ${AUTH_RATE_LIMIT_LOGIN_REGISTER_ENABLED:true}
      capacity: ${AUTH_RATE_LIMIT_LOGIN_REGISTER_CAPACITY:5}
      refill-tokens: ${AUTH_RATE_LIMIT_LOGIN_REGISTER_REFILL_TOKENS:5}
      refill-duration: ${AUTH_RATE_LIMIT_LOGIN_REGISTER_REFILL_DURATION:1m}
      key-prefix: ${AUTH_RATE_LIMIT_LOGIN_REGISTER_KEY_PREFIX:auth:rate-limit:}

  # OTP Config (Forgot/Change Password)
  otp:
    length: 6
    ttl: ${AUTH_OTP_TTL:5m}
    forgot-password-key-prefix: ${AUTH_OTP_FORGOT_KEY_PREFIX:otp:forgot:}
    change-password-key-prefix: ${AUTH_OTP_CHANGE_KEY_PREFIX:otp:change:}

  # Email Verify Config
  verify-email:
    token-ttl: ${AUTH_VERIFY_TOKEN_TTL:24h}
    key-prefix: ${AUTH_VERIFY_KEY_PREFIX:verify:}

  # RabbitMQ event publishing
  rabbitmq:
    critical-exchange: ${AUTH_RABBITMQ_CRITICAL_EXCHANGE:critical.exchange}
    notification-exchange: ${AUTH_RABBITMQ_NOTIFICATION_EXCHANGE:notification.exchange}
    routing:
      email-verify: email.verify
      email-otp: email.otp
      account-created: account.created

management:
  endpoints:
    web:
      exposure:
        include: health,info

