name: Auth Service CI

on:
  push:
    branches: [ "main", "staging", "develop", "feature/**" ]
  pull_request:
    branches: [ "main", "staging", "develop" ]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: auth_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          
      rabbitmq:
        image: rabbitmq:3.13-alpine
        env:
          RABBITMQ_DEFAULT_USER: guest
          RABBITMQ_DEFAULT_PASS: guest
        ports:
          - 5672:5672
        options: >-
          --health-cmd "rabbitmq-diagnostics ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout Auth Repo
      uses: actions/checkout@v4

    - name: Checkout Shared Library Repo
      uses: actions/checkout@v4
      with:
        repository: Nhom07-BTL-KTTKPM/shared-library-repo
        path: shared-library-repo
        # Private repo: uncomment and add PAT_TOKEN secret in repo settings
        # token: ${{ secrets.PAT_TOKEN }}

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Build & Install Shared Library
      run: |
        SHARED_POM=$(find shared-library-repo -name pom.xml -not -path '*/target/*' | head -n 1)
        if [ -z "$SHARED_POM" ]; then
          echo "ERROR: Cannot find pom.xml in shared-library-repo. Check repository name."
          exit 1
        fi
        SHARED_DIR=$(dirname "$SHARED_POM")
        chmod +x "$SHARED_DIR/mvnw"
        cd "$SHARED_DIR" && ./mvnw clean install -DskipTests

    - name: Build & Test Auth Service
      working-directory: ./auth-service
      env:
        SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/auth_db
        SPRING_DATASOURCE_USERNAME: postgres
        SPRING_DATASOURCE_PASSWORD: postgres
        SPRING_DATA_REDIS_HOST: localhost
        SPRING_DATA_REDIS_PORT: 6379
        RABBITMQ_HOST: localhost
        RABBITMQ_PORT: 5672
        RABBITMQ_USERNAME: guest
        RABBITMQ_PASSWORD: guest
        EUREKA_CLIENT_REGISTER_WITH_EUREKA: "false"
        EUREKA_CLIENT_FETCH_REGISTRY: "false"
        AUTH_JWT_SECRET: fake_secret_for_ci_testing_purposes_only_which_must_be_256_bits
      run: |
        chmod +x mvnw
        ./mvnw clean package
