name: Auth Service CI

on:
  push:
    branches: [ "main", "staging", "develop", "feature/**" ]
  pull_request:
    branches: [ "main", "staging", "develop" ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    # 1. Checkout code của auth-repo
    - name: Checkout Auth Repo
      uses: actions/checkout@v4

    # 2. Checkout code của shared-library-repo (CẦN SỬA LẠI URL NẾU KHÁC)
    - name: Checkout Shared Library Repo
      uses: actions/checkout@v4
      with:
        repository: ${{ github.repository_owner }}/shared-library-repo # Giả sử chung chủ sở hữu
        path: shared-library-repo
        # Nếu private repo, cần thêm token:
        # token: ${{ secrets.PAT_TOKEN }}

    # 3. Setup Java 17
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    # 4. Cấp quyền chạy file bash
    - name: Grant execute permission for Maven wrappers
      run: |
        chmod +x shared-library-repo/shared-library/mvnw
        chmod +x auth-service/mvnw

    # 5. Build và Install shared-library vào local maven (.m2)
    - name: Build & Install Shared Library
      working-directory: ./shared-library-repo/shared-library
      run: ./mvnw clean install -DskipTests
      
    # 6. Build và Test Auth Service
    - name: Build & Test Auth Service
      working-directory: ./auth-service
      run: ./mvnw clean package

    # 7. (Tùy chọn) Kiểm tra build Docker Image
    - name: Check Docker Build (Dry Run)
      working-directory: ./auth-service
      run: |
        # Chạy thử lệnh build docker để đảm bảo Dockerfile hoạt động tốt
        # Nếu bạn có Dockerfile riêng trong auth-service thì dùng: docker build -t auth-service:test .
        echo "Docker check passes if maven build passes"
